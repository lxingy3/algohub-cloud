<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1600" viewBox="0 0 2200 1600" role="img" aria-labelledby="title desc">
  <title id="title">AlgoHub database ERD</title>
  <desc id="desc">Entity relationship diagram for the AlgoHub PostgreSQL schema.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .label { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .section { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: .14em; }
      .box { fill: #fff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .scope { fill: #fff7ed; stroke: #d97706; }
      .core { fill: #fffbeb; stroke: #d97706; }
      .join { fill: #fff7ed; stroke: #ea580c; }
      .engage { fill: #ecfdf5; stroke: #059669; }
      .auth { fill: #eef2ff; stroke: #4f46e5; }
      .report { fill: #f5f3ff; stroke: #7c3aed; }
      .feed { fill: #f0f9ff; stroke: #0284c7; }
      .title { font-size: 18px; font-weight: 700; }
      .field { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 12.5px; }
      .line { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #64748b; stroke-width: 1.45; fill: none; marker-end: url(#arrow); }
      .tagtext { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 700; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 10; }
    </style>
  </defs>

  <rect class="page" width="2200" height="1600" />
  <text x="70" y="58" class="label" font-size="31" font-weight="800">AlgoHub Database ERD</text>
  <text x="70" y="88" class="muted">PostgreSQL tables for AlgoStories, grouped by product area.</text>

  <g transform="translate(70 118)">
    <rect class="box scope" width="2060" height="118" />
    <text x="24" y="34" class="label title">Jurisdiction Scope</text>
    <text x="24" y="62" class="field">Jurisdiction.id is the deployment scope. The current deployment uses JURISDICTION_ID=pittsburgh.</text>
    <text x="24" y="86" class="field">Most product tables include jurisdictionId so the same schema can support multiple local deployments.</text>
  </g>

  <text x="70" y="292" class="section">REGISTRY</text>
  <text x="520" y="292" class="section">STORIES AND ENGAGEMENT</text>
  <text x="1050" y="292" class="section">PARTNERS, EVENTS, REPORTS</text>
  <text x="1580" y="292" class="section">IDENTITY AND ACCESS</text>

  <g id="algorithm" transform="translate(70 330)">
    <rect class="box core" width="330" height="168" />
    <text x="20" y="32" class="label title">Algorithm</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">name, slug, description, purpose</text>
    <text x="20" y="98" class="field">agencyName, useCase, location</text>
    <text x="20" y="118" class="field">dataUsed, decisionType</text>
    <text x="20" y="138" class="field">status, impactLevel, currentVersion</text>
  </g>

  <g id="claim" transform="translate(70 570)">
    <rect class="box core" width="330" height="128" />
    <text x="20" y="32" class="label title">AlgorithmClaim</text>
    <text x="20" y="58" class="field">id PK, algorithmId FK</text>
    <text x="20" y="78" class="field">jurisdictionId, claimText</text>
    <text x="20" y="98" class="field">claimSource, claimDate</text>
  </g>

  <g id="document" transform="translate(70 760)">
    <rect class="box core" width="330" height="148" />
    <text x="20" y="32" class="label title">AlgorithmDocument</text>
    <text x="20" y="58" class="field">id PK, algorithmId FK</text>
    <text x="20" y="78" class="field">jurisdictionId, title, sourceType</text>
    <text x="20" y="98" class="field">sourceUrl, storageUrl</text>
    <text x="20" y="118" class="field">rawText, tokenizedText</text>
  </g>

  <g id="testimony" transform="translate(520 330)">
    <rect class="box core" width="370" height="238" />
    <text x="20" y="32" class="label title">Testimony</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">title, summary, narrativeText, city, zipCode</text>
    <text x="20" y="98" class="field">submitterName, contactEmail, referralSource</text>
    <text x="20" y="118" class="field">storyType, publicPosting, followupConsent</text>
    <text x="20" y="138" class="field">audio/video URL, provider, mediaObjectKey</text>
    <text x="20" y="158" class="field">transcriptionStatus, transcriptionText</text>
    <text x="20" y="178" class="field">occurredAtText, affectedDomain, impact</text>
    <text x="20" y="198" class="field">userId, partnerOrgId, facilitatorId</text>
    <text x="20" y="218" class="field">moderationStatus, submittedAt</text>
  </g>

  <g id="link" transform="translate(520 630)">
    <rect class="box join" width="370" height="128" />
    <text x="20" y="32" class="label title">TestimonyAlgorithmLink</text>
    <text x="20" y="58" class="field">testimonyId PK/FK</text>
    <text x="20" y="78" class="field">algorithmId PK/FK</text>
    <text x="20" y="98" class="field">linkType, confidence</text>
  </g>

  <g id="brief" transform="translate(520 830)">
    <rect class="box engage" width="370" height="148" />
    <text x="20" y="32" class="label title">TestimonyBrief</text>
    <text x="20" y="58" class="field">id PK, testimonyId FK</text>
    <text x="20" y="78" class="field">jurisdictionId, summary, keyExcerpts</text>
    <text x="20" y="98" class="field">modelName, reviewedBy</text>
    <text x="20" y="118" class="field">reviewStatus, generatedAt</text>
  </g>

  <g id="transcription" transform="translate(520 1048)">
    <rect class="box engage" width="370" height="148" />
    <text x="20" y="32" class="label title">TranscriptionJob</text>
    <text x="20" y="58" class="field">id PK, testimonyId FK</text>
    <text x="20" y="78" class="field">mediaKind, objectKey, mediaUrl, storageProvider</text>
    <text x="20" y="98" class="field">status, provider, attempts</text>
    <text x="20" y="118" class="field">transcript, error, processedAt</text>
  </g>

  <g id="comment" transform="translate(950 330)">
    <rect class="box engage" width="330" height="152" />
    <text x="20" y="32" class="label title">Comment</text>
    <text x="20" y="58" class="field">id PK, testimonyId FK</text>
    <text x="20" y="78" class="field">jurisdictionId, userId FK</text>
    <text x="20" y="98" class="field">parentCommentId FK</text>
    <text x="20" y="118" class="field">authorName, content, moderationStatus</text>
    <text x="20" y="138" class="field">createdAt, updatedAt</text>
  </g>

  <g id="like" transform="translate(950 550)">
    <rect class="box engage" width="330" height="118" />
    <text x="20" y="32" class="label title">CommentLike</text>
    <text x="20" y="58" class="field">id PK, commentId FK</text>
    <text x="20" y="78" class="field">userId FK</text>
  </g>

  <g id="reaction" transform="translate(950 740)">
    <rect class="box engage" width="330" height="128" />
    <text x="20" y="32" class="label title">TestimonyReaction</text>
    <text x="20" y="58" class="field">id PK, testimonyId FK</text>
    <text x="20" y="78" class="field">userId FK</text>
    <text x="20" y="98" class="field">reactionType</text>
  </g>

  <g id="organization" transform="translate(1380 330)">
    <rect class="box core" width="330" height="158" />
    <text x="20" y="32" class="label title">Organization</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">name, slug, description</text>
    <text x="20" y="98" class="field">contactEmail, websiteUrl, logoUrl</text>
    <text x="20" y="118" class="field">role, isActive</text>
  </g>

  <g id="event" transform="translate(1380 560)">
    <rect class="box feed" width="330" height="150" />
    <text x="20" y="32" class="label title">CommunityEvent</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">title, description, eventType</text>
    <text x="20" y="98" class="field">date, location, organizerOrgId</text>
    <text x="20" y="118" class="field">registrationUrl, imageUrl</text>
  </g>

  <g id="news" transform="translate(1380 800)">
    <rect class="box feed" width="330" height="138" />
    <text x="20" y="32" class="label title">NewsUpdate</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">relatedAlgorithmId FK</text>
    <text x="20" y="98" class="field">relatedEventId FK, title, body</text>
  </g>

  <g id="fullbriefing" transform="translate(1380 1010)">
    <rect class="box report" width="330" height="152" />
    <text x="20" y="32" class="label title">Briefing</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">targetAlgorithmId FK</text>
    <text x="20" y="98" class="field">executiveSummary, keyFindings</text>
    <text x="20" y="118" class="field">reviewStatus, publishedAt</text>
  </g>

  <g id="taxonomy" transform="translate(1380 1230)">
    <rect class="box scope" width="330" height="118" />
    <text x="20" y="32" class="label title">SharedTaxonomy</text>
    <text x="20" y="58" class="field">id PK, category, label</text>
    <text x="20" y="78" class="field">description, parentId FK</text>
  </g>

  <g id="user" transform="translate(1810 330)">
    <rect class="box auth" width="310" height="178" />
    <text x="20" y="32" class="label title">User</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">email, primaryRoleName, name, image</text>
    <text x="20" y="98" class="field">passwordHash, passwordSetAt</text>
    <text x="20" y="118" class="field">organizationId FK</text>
    <text x="20" y="138" class="field">unique jurisdictionId + email + role</text>
    <text x="20" y="158" class="field">emailVerified, createdAt</text>
  </g>

  <g id="account" transform="translate(1810 560)">
    <rect class="box auth" width="310" height="118" />
    <text x="20" y="32" class="label title">Account</text>
    <text x="20" y="58" class="field">id PK, userId FK</text>
    <text x="20" y="78" class="field">provider, providerAccountId, tokens</text>
  </g>

  <g id="session" transform="translate(1810 730)">
    <rect class="box auth" width="310" height="118" />
    <text x="20" y="32" class="label title">Session</text>
    <text x="20" y="58" class="field">id PK, userId FK</text>
    <text x="20" y="78" class="field">sessionToken, expires</text>
  </g>

  <g id="role" transform="translate(1810 900)">
    <rect class="box auth" width="310" height="118" />
    <text x="20" y="32" class="label title">Role</text>
    <text x="20" y="58" class="field">id PK, name</text>
    <text x="20" y="78" class="field">description</text>
  </g>

  <g id="userrole" transform="translate(1810 1070)">
    <rect class="box auth" width="310" height="118" />
    <text x="20" y="32" class="label title">UserRole</text>
    <text x="20" y="58" class="field">userId PK/FK</text>
    <text x="20" y="78" class="field">roleId PK/FK</text>
  </g>

  <g id="submissiondraft" transform="translate(1810 1240)">
    <rect class="box auth" width="310" height="128" />
    <text x="20" y="32" class="label title">SubmissionDraft</text>
    <text x="20" y="58" class="field">id PK, jurisdictionId FK</text>
    <text x="20" y="78" class="field">userId FK, payload JSON</text>
    <text x="20" y="98" class="field">unique jurisdictionId + userId</text>
  </g>

  <g id="token" transform="translate(70 1035)">
    <rect class="box auth" width="330" height="118" />
    <text x="20" y="32" class="label title">VerificationToken</text>
    <text x="20" y="58" class="field">identifier, token</text>
    <text x="20" y="78" class="field">expires</text>
  </g>

  <g id="passwordresettoken" transform="translate(70 1200)">
    <rect class="box auth" width="330" height="138" />
    <text x="20" y="32" class="label title">PasswordResetToken</text>
    <text x="20" y="58" class="field">id PK, userId FK</text>
    <text x="20" y="78" class="field">tokenHash unique</text>
    <text x="20" y="98" class="field">expiresAt, createdAt</text>
  </g>

  <g id="legend" transform="translate(70 1410)">
    <rect class="legend" width="1180" height="104" />
    <text x="20" y="32" class="label title">Relationship notes</text>
    <text x="20" y="58" class="field">User links to accounts, sessions, roles, password reset tokens, drafts, testimonies, comments, likes, and reactions.</text>
    <text x="20" y="80" class="field">Organization links to users, partner testimonies, and community events. VerificationToken remains standalone for token-based auth.</text>
  </g>

  <!-- Registry relationships -->
  <path class="line" d="M235 498 L235 570" />
  <path class="line" d="M235 498 L235 760" />
  <path class="line" d="M400 414 L460 414 L460 694 L520 694" />
  <path class="line2" d="M400 450 L455 450 L455 1086 L1380 1086" />
  <path class="line2" d="M400 470 L450 470 L450 869 L1380 869" />

  <!-- Story relationships -->
  <path class="line" d="M705 568 L705 630" />
  <path class="line" d="M705 568 L705 830" />
  <path class="line" d="M705 568 L705 1048" />
  <path class="line" d="M890 410 L950 410" />
  <path class="line" d="M890 445 L915 445 L915 804 L950 804" />
  <path class="line" d="M1280 406 L1325 406 L1325 610 L1380 610" />
  <path class="line" d="M1115 482 L1115 550" />
  <path class="line2" d="M1280 368 L1310 368 L1310 444 L1280 444" />

  <!-- Partner/report relationships -->
  <path class="line" d="M1710 409 L1810 409" />
  <path class="line" d="M1545 488 L1545 560" />
  <path class="line2" d="M1710 635 L1755 635 L1755 857 L1710 857" />
  <path class="line2" d="M1710 869 L1760 869 L1760 430 L1810 430" />

  <!-- Identity relationships -->
  <path class="line" d="M1965 488 L1965 560" />
  <path class="line" d="M1965 488 L1965 730" />
  <path class="line" d="M1965 488 L1965 1070" />
  <path class="line" d="M1965 1018 L1965 1070" />
  <path class="line" d="M1965 488 L1965 1240" />
  <path class="line2" d="M1810 386 L1760 386 L1760 410 L1710 410" />
  <path class="line2" d="M1810 410 L1750 410 L1750 406 L1280 406" />
  <path class="line2" d="M1810 430 L1725 430 L1725 406 L1280 406" />

  <text x="242" y="535" class="tagtext">claims</text>
  <text x="242" y="742" class="tagtext">documents</text>
  <text x="432" y="672" class="tagtext">links</text>
  <text x="470" y="1070" class="tagtext">briefing target</text>
  <text x="470" y="850" class="tagtext">news target</text>
  <text x="714" y="610" class="tagtext">algorithm links</text>
  <text x="714" y="812" class="tagtext">AI brief</text>
  <text x="714" y="1030" class="tagtext">transcription</text>
  <text x="900" y="392" class="tagtext">comments</text>
  <text x="900" y="786" class="tagtext">reactions</text>
  <text x="1122" y="528" class="tagtext">likes</text>
  <text x="1292" y="594" class="tagtext">organizer</text>
  <text x="1552" y="540" class="tagtext">events</text>
  <text x="1720" y="392" class="tagtext">members</text>
  <text x="1972" y="540" class="tagtext">accounts</text>
  <text x="1972" y="710" class="tagtext">sessions</text>
  <text x="1972" y="1052" class="tagtext">roles</text>
  <text x="1972" y="1222" class="tagtext">drafts</text>
</svg>
